name: Build & Security Scan

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  build-and-scan:
    name: Build & Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tag
        id: tags
        run: |
          SHA_SHORT=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "sha_short=${SHA_SHORT}" >> "$GITHUB_OUTPUT"
          echo "image_tag=githubactions:sha-${SHA_SHORT}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: ${{ steps.tags.outputs.image_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy container scan
        id: scan
        uses: crazy-max/ghaction-container-scan@v4
        with:
          image: ${{ steps.tags.outputs.image_tag }}
          dockerfile: ./Dockerfile
          severity_threshold: HIGH
          ignore_unfixed: true
          annotations: true

      - name: Upload SARIF to GitHub Security
        if: ${{ steps.scan.outputs.sarif != '' }}
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: ${{ steps.scan.outputs.sarif }}

  deploy:
    name: Deploy to App Platform
    runs-on: ubuntu-latest
    needs: build-and-scan
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Trigger App Platform deployment
        run: doctl apps create-deployment ${{ secrets.APP_ID }} --wait
