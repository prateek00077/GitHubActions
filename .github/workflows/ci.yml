name: Build, Scan & Push

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write

env:
  REGISTRY: registry.digitalocean.com
  IMAGE: registry.digitalocean.com/githubactions/githubactions

jobs:
  build-scan-push:
    name: Build, Scan & Push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set image tags
        id: tags
        run: |
          SHA_SHORT=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "sha_short=${SHA_SHORT}" >> "$GITHUB_OUTPUT"
          echo "image_sha=${{ env.IMAGE }}:sha-${SHA_SHORT}" >> "$GITHUB_OUTPUT"
          echo "image_latest=${{ env.IMAGE }}:latest" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: |
            ${{ steps.tags.outputs.image_sha }}
            ${{ steps.tags.outputs.image_latest }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy container scan
        id: scan
        uses: crazy-max/ghaction-container-scan@v4
        with:
          image: ${{ steps.tags.outputs.image_sha }}
          dockerfile: ./Dockerfile
          severity_threshold: HIGH
          ignore_unfixed: true
          annotations: true

      - name: Upload SARIF to GitHub Security
        if: ${{ steps.scan.outputs.sarif != '' }}
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: ${{ steps.scan.outputs.sarif }}

      - name: Install doctl
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Log in to DOCR
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: doctl registry login --expiry-seconds 300

      - name: Push image to DOCR
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          docker push ${{ steps.tags.outputs.image_sha }}
          docker push ${{ steps.tags.outputs.image_latest }}
